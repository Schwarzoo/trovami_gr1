<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <link rel="stylesheet" href="../css/register.css" />
  <title>Registrazione - TrovaMi</title>
</head>
<body>
  <div data-include="header"></div>

  <main class="auth-page">
    <div class="auth-container">
      <form id="registerForm" class="auth-card">
        <h1>Crea account</h1>
        <p>Registrati per iniziare a usare TrovaMi.</p>

        <label for="username">Nome utente</label>
        <input type="text" id="username" name="username" placeholder="Il tuo nome utente" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="nome@email.com" required />

        <label for="phoneNumber">Telefono</label>
        <input type="text" id="phoneNumber" name="phoneNumber" placeholder="Facoltativo" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimo 8 caratteri" required />

        <label for="confirmPassword">Conferma password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ripeti la password" required />

        <div class="auth-actions">
          <button type="submit" id="registerSubmit">Registrati</button>
        </div>
        <p id="registerError" class="error"></p>
      </form>
      <div id="registerSuccessPanel" class="auth-card is-hidden" aria-live="polite">
        <h1>Registrazione completata</h1>
        <p id="registerSuccess" class="success"></p>
        <div class="auth-actions">
          <button type="button" id="goToLogin">Vai al login</button>
          <button type="button" id="resendVerification">Rinvia email di verifica</button>
        </div>
        <p id="resendMessage" class="success"></p>
      </div>
    </div>
  </main>

  <script src="/js/includes.js"></script>
  <div data-include="footer"></div>

  <script src="../js/register.js"></script>
</body>
</html>
