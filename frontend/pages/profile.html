<!DOCTYPE html>
<html lang="it">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<link rel="stylesheet" href="../css/announcements.css" />
	<link rel="stylesheet" href="../css/style.css" />
	<link rel="stylesheet" href="../css/header.css" />
	<link rel="stylesheet" href="../css/profile.css" />
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<title>Profilo — Trovami</title>
</head>

<body>
	<div data-include="header"></div>

	<main class="page">
		<div class="page-header">
			<h1>Il mio profilo</h1>
			<p>Visualizza e gestisci il tuo account e i tuoi annunci</p>
		</div>

		<div class="profile-grid">
			<section id="profile-section" class="section-card">
				<h2>Dati profilo</h2>
				<form id="profileForm" class="form-stack">
					<div class="field">
						<label>Username</label>
						<input id="username" placeholder="Il tuo username" />
					</div>

					<div class="field">
						<label>Email (readonly)</label>
						<input id="email" readonly />
						<span class="form-hint">La mail e' usata per l'accesso.</span>
					</div>

					<div class="field">
						<label>Telefono</label>
						<input id="phoneNumber" placeholder="Facoltativo" />
					</div>

					<div style="display:flex;gap:8px;margin-top:8px;">
						<button type="submit" class="btn btn--primary">Salva</button>
						<span id="profileMessage" style="align-self:center;color:var(--text-muted);"></span>
					</div>
					<div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(0,0,0,0.08);">
						<button id="logoutBtn" type="button" class="btn btn--danger">Logout</button>
					</div>
					<div style="margin-top:12px;">
						<button id="deleteAccount" class="btn btn--danger">Elimina account</button>
					</div>
				</form>
			</section>

			<section id="my-announcements" class="section-card">
				<h2>I miei annunci</h2>
				<button id="showCreate" class="btn btn--ghost">Nuovo annuncio</button>
				<div id="announcements-grid" style="margin-top:16px;"></div>
		</div>
		</section>

	</main>

	<script src="../js/profile.js"></script>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

	<!-- Modal for create/edit announcement -->
			<div id="modal-overlay" class="modal-overlay" style="display:none;">
		<div class="modal-card">
			<div class="modal-header">
				<h3 id="modal-title">Annuncio</h3><button id="modal-close">✕</button>
			</div>
			<div class="modal-body">
							<form id="modalForm" class="modal-form">
								<div class="form-grid">
									<div class="field">
										<label>Tipo</label>
										<select id="modal-type">
											<option value="LostAnimal">Smarrito</option>
											<option value="Sighting">Avvistamento</option>
										</select>
									</div>
									<div class="field checkbox-row">
										<label><input id="modal-isCurrentlyThere" type="checkbox" />Attualmente presente</label>
									</div>
								</div>
								<div class="field">
									<label>Descrizione</label>
									<textarea id="modal-description" placeholder="Aggiungi dettagli utili..."></textarea>
								</div>
								<div class="form-grid">
									<div class="field">
										<label>Specie</label>
										<input id="modal-species" placeholder="Es. Cane, Gatto" />
									</div>
									<div class="field">
										<label>Razza</label>
										<input id="modal-breed" placeholder="Es. Labrador" />
									</div>
								</div>
								<div class="form-grid">
									<div class="field">
										<label>Comportamento</label>
										<select id="modal-animalBehaviour">
											<option value="indifferente">indifferente</option>
											<option value="tranquillo">tranquillo</option>
											<option value="spaventato">spaventato</option>
											<option value="aggressivo">aggressivo</option>
										</select>
									</div>
									<div class="field">
										<label>Condizione salute</label>
										<select id="modal-healthCondition">
											<option value="in salute">in salute</option>
											<option value="ferito">ferito</option>
											<option value="malnutrito">malnutrito</option>
										</select>
									</div>
								</div>
								<div class="field">
									<label>Foto (URL)</label>
									<input id="modal-photo" placeholder="https://..." />
									<span class="form-hint">Usa un link pubblico dell'immagine.</span>
								</div>
					<img id="modal-photo-preview" src="" alt="preview"
						style="display:none;max-width:100%;border-radius:8px;margin-top:8px;" />
								<div class="form-grid">
									<div class="field">
										<label>Ultima data vista</label>
										<div class="choice-buttons" role="group" aria-label="Scelta data avvistamento">
											<button type="button" id="lastSeenTodayBtn" class="btn btn--ghost is-selected">Oggi</button>
											<button type="button" id="lastSeenCustomBtn" class="btn btn--ghost">Scegli data</button>
										</div>
										<input id="modal-lastSeenDate" type="date" style="display:none;" />
									</div>
								</div>
								<div class="field">
									<label>Posizione</label>
									<div class="location-actions">
										<button type="button" id="pickOnMap" class="btn btn--ghost">Seleziona su mappa</button>
										<button type="button" id="useMyLocation" class="btn btn--ghost">Usa la mia posizione</button>
									</div>
									<span class="form-hint">Scegli un punto sulla mappa o usa la posizione attuale.</span>
								</div>
					<input id="modal-coords" type="hidden" />
					<div id="modal-map" style="height:220px;margin-top:8px;display:none;border-radius:8px;overflow:hidden;"></div>
							<div class="form-actions">
						<button id="modal-save" class="btn btn--primary" type="button">Pubblica</button>
						<button id="modal-cancel" class="btn btn--ghost" type="button">Annulla</button>
					</div>
				</form>
			</div>
		</div>
	</div>
	<script src="/js/includes.js"></script>
	<div data-include="footer"></div>
</body>

</html>
