<!DOCTYPE html>
<html lang="it">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<link rel="stylesheet" href="../css/style.css" />
	<link rel="stylesheet" href="../css/header.css" />
	<link rel="stylesheet" href="../css/login.css" />
	<title>Reimposta Password — Trovami</title>
</head>

<body>
	<div data-include="header"></div>

	<main class="auth-page">
		<div class="auth-container">
			<div class="auth-card">
				<h1>Reimposta Password</h1>
				<p style="color:var(--text-muted);margin-bottom:24px;">Inserisci la tua nuova password</p>

				<form id="resetPasswordForm">
					<label for="password">Nuova Password</label>
					<input type="password" id="password" name="password" required placeholder="Minimo 8 caratteri" />

					<label for="confirmPassword">Conferma Password</label>
					<input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Ripeti la password" />

					<button type="submit" class="btn btn--primary" style="width:100%;margin-top:12px;">Reimposta Password</button>
					<div id="message" style="margin-top:12px;text-align:center;color:var(--text-muted);"></div>
				</form>

				<div style="margin-top:24px;text-align:center;">
					<p><a href="/pages/login.html">Torna al login</a></p>
				</div>
			</div>
		</div>
	</main>

	<script src="/js/includes.js"></script>
	<div data-include="footer"></div>

	<script>
		function getQueryParam(name) {
			const params = new URLSearchParams(window.location.search);
			return params.get(name);
		}

		const token = getQueryParam('token');
		if (!token) {
			document.getElementById('message').style.color = 'var(--error-color)';
			document.getElementById('message').textContent = 'Link non valido';
			document.getElementById('resetPasswordForm').style.display = 'none';
		}

		document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			const password = document.getElementById('password').value;
			const confirmPassword = document.getElementById('confirmPassword').value;
			const messageDiv = document.getElementById('message');

			messageDiv.textContent = '';

			if (password !== confirmPassword) {
				messageDiv.style.color = 'var(--error-color)';
				messageDiv.textContent = 'Le password non coincidono';
				return;
			}

			if (password.length < 8) {
				messageDiv.style.color = 'var(--error-color)';
				messageDiv.textContent = 'La password deve avere almeno 8 caratteri';
				return;
			}

			try {
				const res = await fetch('http://localhost:3000/api/auth/reset-password', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ token, newPassword: password })
				});

				const data = await res.json();

				if (res.ok) {
					messageDiv.style.color = 'var(--success-color)';
					messageDiv.textContent = 'Password aggiornata con successo! Reindirizzamento...';
					setTimeout(() => {
						window.location.href = '/pages/login.html';
					}, 2000);
				} else {
					messageDiv.style.color = 'var(--error-color)';
					messageDiv.textContent = data.message || 'Errore nel reset password';
				}
			} catch (err) {
				messageDiv.style.color = 'var(--error-color)';
				messageDiv.textContent = 'Errore di connessione';
				console.error(err);
			}
		});
	</script>
</body>

</html>
