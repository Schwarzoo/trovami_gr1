<!DOCTYPE html>
<html lang="it">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<link rel="stylesheet" href="../css/style.css" />
	<link rel="stylesheet" href="../css/header.css" />
	<link rel="stylesheet" href="../css/login.css" />
	<title>Recupero Password — Trovami</title>
</head>

<body>
	<div data-include="header"></div>

	<main class="auth-page">
		<div class="auth-container">
			<div class="auth-card">
				<h1>Recupera Password</h1>
				<p style="color:var(--text-muted);margin-bottom:24px;">Inserisci la tua email per ricevere un link di recupero</p>

				<form id="forgotPasswordForm">
					<label for="email">Email</label>
					<input type="email" id="email" name="email" required />

					<button type="submit" class="btn btn--primary" style="width:100%;margin-top:12px;">Invia link</button>
					<div id="message" style="margin-top:12px;text-align:center;color:var(--text-muted);"></div>
				</form>

				<div style="margin-top:24px;text-align:center;">
					<p>Ricordi la password? <a href="/pages/login.html">Torna al login</a></p>
				</div>
			</div>
		</div>
	</main>

	<script src="/js/includes.js"></script>
	<div data-include="footer"></div>

	<script>
		document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			const email = document.getElementById('email').value;
			const messageDiv = document.getElementById('message');

			messageDiv.textContent = '';

			try {
				const res = await fetch('http://localhost:3000/api/auth/forgot-password', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ email })
				});

				const data = await res.json();

				if (res.ok) {
					messageDiv.style.color = 'var(--success-color)';
					messageDiv.textContent = 'Email inviata! Controlla la tua posta.';
					document.getElementById('forgotPasswordForm').reset();
				} else {
					messageDiv.style.color = 'var(--error-color)';
					messageDiv.textContent = data.message || 'Errore nel recupero password';
				}
			} catch (err) {
				messageDiv.style.color = 'var(--error-color)';
				messageDiv.textContent = 'Errore di connessione';
				console.error(err);
			}
		});
	</script>
</body>

</html>
